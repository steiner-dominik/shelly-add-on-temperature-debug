<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Shelly Add-on Temperature Debug</title>
<style>
:root {
  color-scheme: light;
  --surface-1: #fcfcfb;
  --page: #f9f9f7;
  --text-primary: #0b0b0b;
  --text-secondary: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --series-1: #2a78d6; --series-2: #1baf7a; --series-3: #eda100; --series-4: #008300;
  --series-5: #4a3aa7; --series-6: #e34948; --series-7: #e87ba4; --series-8: #eb6834;
  --good: #0ca30c; --warning: #fab219; --serious: #ec835a; --critical: #d03b3b;
  --good-text: #006300; --warn-text: #8a5a00;
  --good-bg: rgba(12,163,12,.12); --warning-bg: rgba(250,178,25,.18); --critical-bg: rgba(208,59,59,.12);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --surface-1: #1a1a19;
    --page: #0d0d0d;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500; --series-4: #008300;
    --series-5: #9085e9; --series-6: #e66767; --series-7: #d55181; --series-8: #d95926;
    --good-text: #0ca30c; --warn-text: #fab219;
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --surface-1: #1a1a19;
  --page: #0d0d0d;
  --text-primary: #ffffff;
  --text-secondary: #c3c2b7;
  --muted: #898781;
  --grid: #2c2c2a;
  --baseline: #383835;
  --border: rgba(255,255,255,0.10);
  --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500; --series-4: #008300;
  --series-5: #9085e9; --series-6: #e66767; --series-7: #d55181; --series-8: #d95926;
  --good-text: #0ca30c; --warn-text: #fab219;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--page); color: var(--text-primary);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
}
main { max-width: 860px; margin: 0 auto; padding: 24px 16px 48px; }
header.top { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
.titleblock { flex: 1 1 320px; }
h1 { font-size: 1.35rem; margin: 0 0 4px; display: flex; align-items: center; gap: 10px; }
h1 .logo { display: inline-flex; width: 34px; height: 34px; border-radius: 9px; background: var(--text-primary);
  color: var(--page); align-items: center; justify-content: center; font-size: 19px; flex: none; }
.sub { color: var(--text-secondary); margin: 0; font-size: .92rem; }
.prefs { display: flex; gap: 8px; align-items: center; margin-left: auto; }
.prefs select { font: inherit; font-size: .84rem; padding: 5px 8px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--surface-1); color: var(--text-primary); }
.toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 18px 0; }
button.primary {
  font: inherit; font-weight: 600; padding: 9px 18px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--text-primary); color: var(--page);
}
button.primary:disabled { opacity: .55; cursor: wait; }
.lastq { color: var(--muted); font-size: .85rem; }
.tokenbox { display: none; gap: 8px; align-items: center; flex-wrap: wrap;
  border: 1px solid var(--border); background: var(--surface-1); border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; }
.tokenbox input { font: inherit; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--baseline); background: var(--page); color: var(--text-primary); min-width: 200px; }
.tokenbox button { font: inherit; padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--text-primary); color: var(--page); cursor: pointer; }
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; }
.tile .v { font-size: 1.7rem; font-weight: 700; line-height: 1.2; }
.tile .l { color: var(--muted); font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.tile.good .v { color: var(--good-text); }
.tile.bad .v { color: var(--critical); }
.card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px 14px; margin-bottom: 20px; }
.ephead { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.ephead h2 { font-size: 1.08rem; margin: 0; }
.ephost { color: var(--muted); font-size: .85rem; }
.epmeta { color: var(--text-secondary); font-size: .82rem; margin: 3px 0 10px; }
.chip { display: inline-flex; align-items: center; gap: 5px; font-size: .78rem; font-weight: 600;
  padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
.chip.ok   { color: var(--good-text); background: var(--good-bg); }
.chip.warn { color: var(--warn-text); background: var(--warning-bg); }
.chip.crit { color: var(--critical);  background: var(--critical-bg); }
table.sensors { width: 100%; border-collapse: collapse; }
table.sensors td, table.sensors th { padding: 8px 8px; text-align: left; border-top: 1px solid var(--grid); vertical-align: top; }
table.sensors th { color: var(--muted); font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; border-top: none; }
.sname { font-weight: 600; }
.skey { color: var(--muted); font-size: .78rem; }
.temp { font-size: 1.25rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
.temp.na { color: var(--muted); font-size: 1rem; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; vertical-align: baseline; }
.guide { border-left: 3px solid var(--baseline); margin: 2px 0 8px; padding: 6px 12px;
  color: var(--text-secondary); font-size: .88rem; background: var(--page); border-radius: 0 8px 8px 0; }
.guide.crit { border-left-color: var(--critical); }
.guide.warn { border-left-color: var(--warning); }
.note { color: var(--text-secondary); font-size: .85rem; margin: 8px 0 0; }
.chartwrap { margin-top: 14px; }
.charttitle { color: var(--muted); font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.legend { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: .82rem; color: var(--text-secondary); margin-top: 6px; }
.legend span { display: inline-flex; align-items: center; }
svg.chart { width: 100%; height: 180px; display: block; }
svg.chart text { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--muted); }
.tooltip { position: fixed; pointer-events: none; z-index: 10; display: none;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 11px; font-size: .8rem; box-shadow: 0 4px 16px rgba(0,0,0,.18); max-width: 260px; }
.tooltip .tt-time { color: var(--muted); margin-bottom: 3px; }
.tooltip .tt-row { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tooltip .tt-val { margin-left: auto; font-variant-numeric: tabular-nums; padding-left: 12px; }
.empty { color: var(--muted); text-align: center; padding: 40px 0; }
footer { color: var(--muted); font-size: .8rem; margin-top: 28px; border-top: 1px solid var(--grid); padding-top: 14px; }
footer a { color: inherit; }
footer .meta { margin-top: 8px; }
</style>
</head>
<body>
<main>
  <header class="top">
    <div class="titleblock">
      <h1><span class="logo" aria-hidden="true">🌡</span>Shelly Add-on Temperature Debug</h1>
      <p class="sub" id="subtitle"></p>
    </div>
    <div class="prefs">
      <select id="langsel" aria-label="Language"></select>
      <select id="themesel" aria-label="Theme"></select>
    </div>
  </header>

  <div class="tokenbox" id="tokenbox">
    <span id="tokenprompt"></span>
    <input id="tokeninput" type="password" autocomplete="off">
    <button id="tokensave"></button>
  </div>

  <div class="toolbar">
    <button class="primary" id="querybtn"></button>
    <span class="lastq" id="lastq"></span>
  </div>

  <div class="tiles" id="tiles" style="display:none"></div>

  <div id="results"><p class="empty">…</p></div>

  <footer>
    <div id="legendline"></div>
    <div id="historynote"></div>
    <div class="meta">
      <span id="disclaimer"></span><br>
      Shelly Add-on Temperature Debug __VERSION__ ·
      <a href="https://github.com/steiner-dominik/shelly-add-on-temperature-debug" rel="noopener">GitHub</a> · MIT
    </div>
  </footer>
</main>
<div class="tooltip" id="tooltip"></div>

<script>
"use strict";
const base = location.pathname.replace(/\/$/, "");
const $ = id => document.getElementById(id);
const SERIES = [1,2,3,4,5,6,7,8].map(i => `var(--series-${i})`);
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// --- i18n -------------------------------------------------------------
let L = null;         // active locale object
let locales = [];     // [{code, name}]
const fmt = (s, vars) => String(s || "").replace(/\{(\w+)\}/g, (_, k) => vars && k in vars ? vars[k] : "{" + k + "}");
const t = key => (L && L.ui && L.ui[key]) || key;

async function loadLocales() {
  locales = await (await fetch(base + "/locales/index.json")).json();
  let lang = localStorage.getItem("lang");
  if (!locales.some(l => l.code === lang)) {
    const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
    lang = locales.some(l => l.code === nav) ? nav : "en";
  }
  L = await (await fetch(base + "/locales/" + lang + ".json")).json();
  document.documentElement.lang = lang;
  const sel = $("langsel");
  sel.innerHTML = locales.map(l => `<option value="${esc(l.code)}"${l.code === lang ? " selected" : ""}>${esc(l.name)}</option>`).join("");
  sel.onchange = async () => {
    localStorage.setItem("lang", sel.value);
    L = await (await fetch(base + "/locales/" + sel.value + ".json")).json();
    document.documentElement.lang = sel.value;
    applyChrome();
    if (lastData) {
      render(lastData, lastHist);
      $("lastq").textContent = fmt(t("lastQuery"), { time: new Date(lastData.ts * 1000).toLocaleTimeString() });
    }
  };
}

function applyChrome() {
  $("subtitle").textContent = t("subtitle");
  $("querybtn").textContent = t("queryBtn");
  $("tokenprompt").textContent = t("tokenPrompt");
  $("tokeninput").placeholder = t("tokenPlaceholder");
  $("tokensave").textContent = t("unlock");
  $("historynote").textContent = t("historyNote");
  $("disclaimer").textContent = t("disclaimer");
  const lg = [["ok", "legendOk"], ["reset85", "legendReset85"], ["read_error", "legendReadError"], ["missing", "legendMissing"]]
    .map(([st, key]) => `<b>${esc(L.status[st])}</b> — ${esc(t(key))}`).join(" · ");
  $("legendline").innerHTML = `${esc(t("legendTitle"))} ${lg}`;
  const th = $("themesel");
  const cur = localStorage.getItem("theme") || "auto";
  th.innerHTML = [["auto", "themeAuto"], ["light", "themeLight"], ["dark", "themeDark"]]
    .map(([v, key]) => `<option value="${v}"${v === cur ? " selected" : ""}>${esc(t(key))}</option>`).join("");
}

// --- theme ------------------------------------------------------------
function applyTheme(mode) {
  if (mode === "light" || mode === "dark") document.documentElement.dataset.theme = mode;
  else delete document.documentElement.dataset.theme;
}
applyTheme(localStorage.getItem("theme") || "auto");
$("themesel").addEventListener("change", e => {
  localStorage.setItem("theme", e.target.value);
  applyTheme(e.target.value);
});

// --- token handling (optional, only enforced if DEBUG_TOKEN is set) ---
const url = new URL(location.href);
if (url.searchParams.has("token")) {
  localStorage.setItem("debugToken", url.searchParams.get("token"));
  url.searchParams.delete("token");
  history.replaceState(null, "", url.toString());
}
function authHeaders() {
  const tok = localStorage.getItem("debugToken");
  return tok ? { "X-Debug-Token": tok } : {};
}
$("tokensave").addEventListener("click", () => {
  localStorage.setItem("debugToken", $("tokeninput").value.trim());
  $("tokenbox").style.display = "none";
  runQuery();
});
$("tokeninput").addEventListener("keydown", e => { if (e.key === "Enter") $("tokensave").click(); });

// --- querying ---------------------------------------------------------
async function api(path, opts = {}) {
  const resp = await fetch(base + path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
  if (resp.status === 401) { throw { unauthorized: true }; }
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return resp.json();
}

let lastData = null, lastHist = null;
async function runQuery() {
  const btn = $("querybtn");
  btn.disabled = true; btn.textContent = t("querying");
  try {
    const data = await api("/api/query", { method: "POST" });
    const hist = await api("/api/history");
    lastData = data; lastHist = hist;
    render(data, hist);
    $("lastq").textContent = fmt(t("lastQuery"), { time: new Date(data.ts * 1000).toLocaleTimeString() });
  } catch (e) {
    if (e && e.unauthorized) {
      $("tokenbox").style.display = "flex";
      $("results").innerHTML = `<p class="empty">${esc(t("locked"))}</p>`;
    } else {
      $("results").innerHTML = `<p class="empty">${esc(fmt(t("queryFailed"), { err: e.message || e }))}</p>`;
    }
  } finally {
    btn.disabled = false; btn.textContent = t("queryBtn");
  }
}
$("querybtn").addEventListener("click", runQuery);

// --- rendering --------------------------------------------------------
const CHIP = {
  ok: "ok", reset85: "warn", read_error: "crit", missing: "crit",
  unreachable: "crit", auth_failed: "crit", no_sensors: "warn",
};
const ICON = { ok: "✓", warn: "⚠", crit: "✕" };
const chip = st => {
  const cls = CHIP[st] || "warn";
  return `<span class="chip ${cls}"><span aria-hidden="true">${ICON[cls]}</span>${esc(L.status[st] || st)}</span>`;
};
const fmtT = v => v == null ? "—" : v.toFixed(1) + " °C";

function renderTiles(data) {
  const eps = data.endpoints;
  const devOk = eps.filter(e => e.status === "ok").length;
  const allSensors = eps.flatMap(e => e.sensors);
  const senOk = allSensors.filter(s => s.status === "ok").length;
  const problems = (eps.length - devOk) + (allSensors.length - senOk);
  const tiles = [
    { v: `${devOk}/${eps.length}`, l: t("tileDevices"), cls: devOk === eps.length ? "good" : "bad" },
    { v: `${senOk}/${allSensors.length}`, l: t("tileSensors"), cls: senOk === allSensors.length ? "good" : "bad" },
    { v: String(problems), l: t("tileProblems"), cls: problems === 0 ? "good" : "bad" },
  ];
  $("tiles").innerHTML = tiles.map(x => `<div class="tile ${x.cls}"><div class="v">${esc(x.v)}</div><div class="l">${esc(x.l)}</div></div>`).join("");
  $("tiles").style.display = "";
}

function render(data, hist) {
  renderTiles(data);
  const out = [];
  data.endpoints.forEach((ep, epIdx) => {
    const meta = [ep.device, ep.wifiRssi != null ? `${t("wifi")} ${ep.wifiRssi} dBm` : null,
      ep.uptimeSec != null ? `${t("uptime")} ${fmtUptime(ep.uptimeSec)}` : null].filter(Boolean).join(" · ");
    let body = "";
    if (ep.status !== "ok") {
      const g = (L.guidance.endpoint || {})[ep.status] || "";
      body += `<div class="guide ${CHIP[ep.status] || "warn"}">${esc(g)}${ep.error ? `<br><span class="skey">${esc(ep.error)}</span>` : ""}</div>`;
    }
    if (ep.sensors.length) {
      body += `<table class="sensors"><tr><th>${esc(t("colSensor"))}</th><th>${esc(t("colTemperature"))}</th><th>${esc(t("colStatus"))}</th></tr>`;
      ep.sensors.forEach((s, i) => {
        body += `<tr>
          <td><span class="dot" style="background:${SERIES[i % 8]}"></span><span class="sname">${esc(s.name)}</span><br><span class="skey">${esc(s.key)}</span></td>
          <td><span class="temp ${s.tC == null ? "na" : ""}">${fmtT(s.tC)}</span></td>
          <td>${chip(s.status)}</td></tr>`;
        const g = (L.guidance.sensor || {})[s.status];
        if (g) body += `<tr><td colspan="3" style="border-top:none;padding-top:0"><div class="guide ${CHIP[s.status]}">${esc(g)}</div></td></tr>`;
      });
      body += `</table>`;
    }
    if (ep.wifiRssi != null && ep.wifiRssi <= -75) {
      body += `<p class="note">ℹ️ ${esc(fmt(t("wifiWeak"), { rssi: ep.wifiRssi }))}</p>`;
    }
    body += chartFor(ep, (hist.endpoints || {})[ep.name] || {}, epIdx);
    out.push(`<div class="card">
      <div class="ephead"><h2>${esc(ep.name)}</h2><span class="ephost">${esc(ep.host)}</span>${chip(ep.status)}</div>
      ${meta ? `<div class="epmeta">${esc(meta)}</div>` : ""}${body}</div>`);
  });
  $("results").innerHTML = out.join("");
  bindTooltips();
}

const fmtUptime = s => s >= 86400 ? Math.floor(s / 86400) + "d " + Math.floor(s % 86400 / 3600) + "h"
  : s >= 3600 ? Math.floor(s / 3600) + "h " + Math.floor(s % 3600 / 60) + "m" : Math.floor(s / 60) + "m";
const fmtClock = ts => new Date(ts * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });

// One line chart per endpoint: x = query time, y = °C, one series per sensor.
// Failed reads (tC null) break the line and are marked with an ✕ under the plot.
const chartData = {}; // epIdx -> {tsList, series} for tooltip lookup
function chartFor(ep, histSensors, epIdx) {
  const keys = ep.sensors.map(s => s.key).filter(k => histSensors[k]);
  const series = keys.map((k, i) => ({ key: k, name: histSensors[k].name, color: SERIES[i % 8], byTs: new Map(histSensors[k].samples.map(sm => [sm.ts, sm])) }));
  const tsSet = new Set();
  series.forEach(s => s.byTs.forEach((_, ts) => tsSet.add(ts)));
  const tsList = [...tsSet].sort((a, b) => a - b);
  if (!tsList.length) return "";
  chartData[epIdx] = { tsList, series };

  const W = 820, H = 180, padL = 44, padR = 10, padT = 10, padB = 26;
  const values = [];
  series.forEach(s => s.byTs.forEach(sm => { if (sm.tC != null) values.push(sm.tC); }));
  let lo = values.length ? Math.min(...values) : 0, hi = values.length ? Math.max(...values) : 1;
  if (hi - lo < 2) { const m = (hi + lo) / 2; lo = m - 1; hi = m + 1; }
  const span = hi - lo; lo -= span * 0.08; hi += span * 0.08;
  const t0 = tsList[0], t1 = tsList[tsList.length - 1];
  const x = ts => t1 === t0 ? (padL + (W - padL - padR) / 2) : padL + (ts - t0) / (t1 - t0) * (W - padL - padR);
  const y = v => padT + (hi - v) / (hi - lo) * (H - padT - padB);

  let g = "";
  for (let i = 0; i <= 2; i++) {
    const v = lo + (hi - lo) * i / 2, yy = y(v);
    g += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL - 6}" y="${yy + 4}" text-anchor="end">${v.toFixed(1)}°</text>`;
  }
  g += `<text x="${padL}" y="${H - 8}">${fmtClock(t0)}</text>`;
  if (t1 !== t0) g += `<text x="${W - padR}" y="${H - 8}" text-anchor="end">${fmtClock(t1)}</text>`;

  series.forEach(s => {
    let path = "", pen = false;
    tsList.forEach(ts => {
      const sm = s.byTs.get(ts);
      if (sm && sm.tC != null) {
        path += (pen ? "L" : "M") + x(ts).toFixed(1) + " " + y(sm.tC).toFixed(1) + " ";
        pen = true;
      } else if (sm) {
        // failed read: break the line, mark the failure
        g += `<text x="${x(ts).toFixed(1)}" y="${H - padB - 4}" text-anchor="middle" style="fill:var(--critical);font-weight:700">✕</text>`;
        pen = false;
      } else { pen = false; }
    });
    if (path) g += `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    tsList.forEach(ts => {
      const sm = s.byTs.get(ts);
      if (sm && sm.tC != null) g += `<circle cx="${x(ts).toFixed(1)}" cy="${y(sm.tC).toFixed(1)}" r="2.5" fill="${s.color}"/>`;
    });
  });

  const legend = series.map(s => {
    const last = [...s.byTs.values()].pop();
    return `<span><span class="dot" style="background:${s.color}"></span>${esc(s.name)}&nbsp;<b>${fmtT(last ? last.tC : null)}</b></span>`;
  }).join("");

  const title = fmt(t("history"), { n: tsList.length, queries: tsList.length === 1 ? t("queryOne") : t("queryOther") });
  return `<div class="chartwrap"><div class="charttitle">${esc(title)}</div>
    <svg class="chart" viewBox="0 0 ${W} ${H}" data-ep="${epIdx}" preserveAspectRatio="none">
      <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--baseline)" stroke-width="1"/>
      ${g}
      <line class="xh" x1="0" y1="${padT}" x2="0" y2="${H - padB}" stroke="var(--baseline)" stroke-width="1" style="display:none"/>
    </svg><div class="legend">${legend}</div></div>`;
}

// crosshair + tooltip: nearest query time under the cursor, all sensors listed
function bindTooltips() {
  const tt = $("tooltip");
  document.querySelectorAll("svg.chart").forEach(svg => {
    const { tsList, series } = chartData[svg.dataset.ep] || {};
    if (!tsList) return;
    const W = 820, padL = 44, padR = 10;
    const t0 = tsList[0], t1 = tsList[tsList.length - 1];
    svg.addEventListener("mousemove", e => {
      const r = svg.getBoundingClientRect();
      const vx = (e.clientX - r.left) / r.width * W;
      const frac = t1 === t0 ? 0 : Math.min(1, Math.max(0, (vx - padL) / (W - padL - padR)));
      const target = t0 + frac * (t1 - t0);
      let best = tsList[0];
      tsList.forEach(ts => { if (Math.abs(ts - target) < Math.abs(best - target)) best = ts; });
      const xh = svg.querySelector(".xh");
      const xPos = t1 === t0 ? padL + (W - padL - padR) / 2 : padL + (best - t0) / (t1 - t0) * (W - padL - padR);
      xh.setAttribute("x1", xPos); xh.setAttribute("x2", xPos); xh.style.display = "";
      let rows = "";
      series.forEach(s => {
        const sm = s.byTs.get(best);
        if (!sm) return;
        rows += `<div class="tt-row"><span class="dot" style="background:${s.color}"></span>${esc(s.name)}<span class="tt-val">${sm.tC == null ? esc(L.status[sm.status] || "—") : fmtT(sm.tC)}</span></div>`;
      });
      tt.innerHTML = `<div class="tt-time">${fmtClock(best)}</div>` + rows;
      tt.style.display = "block";
      const tw = tt.offsetWidth;
      tt.style.left = Math.min(e.clientX + 14, window.innerWidth - tw - 8) + "px";
      tt.style.top = (e.clientY + 14) + "px";
    });
    svg.addEventListener("mouseleave", () => {
      tt.style.display = "none";
      svg.querySelector(".xh").style.display = "none";
    });
  });
}

// --- boot -------------------------------------------------------------
(async () => {
  try {
    await loadLocales();
  } catch (e) {
    L = { ui: {}, status: {}, guidance: { sensor: {}, endpoint: {} } };
  }
  applyChrome();
  runQuery();
})();
</script>
