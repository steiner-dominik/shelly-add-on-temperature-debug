name: Build, publish and release

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the CalVer tag + GitHub release
      packages: write   # push the image to GHCR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, needed for CalVer counting

      # CalVer: YYYY.MM.DD for the first release of a (UTC) day,
      # YYYY.MM.DD.1, .2, … for further releases on the same day.
      - name: Compute CalVer version
        id: ver
        if: github.event_name != 'pull_request'
        run: |
          base="$(date -u +%Y.%m.%d)"
          version="$base"
          n=0
          while git rev-parse -q --verify "refs/tags/$version" >/dev/null; do
            n=$((n+1)); version="$base.$n"
          done
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version || 'dev' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build release binaries
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          V="${{ steps.ver.outputs.version }}"
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags="-s -w -X main.version=$V" \
              -o "dist/shelly-add-on-temperature-debug_${V}_linux_${arch}" .
          done

      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          git tag "$V" "${{ github.sha }}"
          git push origin "refs/tags/$V"
          gh release create "$V" dist/* \
            --title "$V" \
            --generate-notes \
            --notes "Container image: \`ghcr.io/${{ github.repository }}:$V\` (linux/amd64 + linux/arm64)"
