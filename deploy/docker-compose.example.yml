# Shelly Add-on Temperature Debug — example docker-compose
#
# Quick start:
#   1. Download this file and env.example next to it:
#        curl -LO https://github.com/steiner-dominik/shelly-add-on-temperature-debug/releases/latest/download/docker-compose.example.yml
#        curl -LO https://github.com/steiner-dominik/shelly-add-on-temperature-debug/releases/latest/download/env.example
#   2. cp env.example .env    # then edit .env (hosts, passwords, token)
#   3. mv docker-compose.example.yml docker-compose.yml
#   4. docker compose up -d
#   5. Open http://localhost:8080/debug and enter your DEBUG_TOKEN.
#
# This file is deliberately static: ALL configuration (devices, secrets,
# tuning) lives in .env — you should never need to edit this file. The app is
# stateless: no volumes, nothing written to disk. NEVER commit your .env.

# Fixed project name, so this stack never collides with other compose
# projects that also call their service "shelly-debug".
name: shelly-debug

services:
  shelly-debug:
    image: ghcr.io/steiner-dominik/shelly-add-on-temperature-debug:latest
    # Pin a CalVer tag in production so "latest" can't move under you, e.g.:
    # image: ghcr.io/steiner-dominik/shelly-add-on-temperature-debug:2026.07.19.1
    restart: unless-stopped
    # The app needs no privileges — run it as nobody. (The image bakes in no
    # USER because the Home Assistant add-on variant must read a root-only
    # options file; standalone, this line gives you the same hardening.)
    user: "65534:65534"
    ports:
      # host:container — the container side must match PORT in .env
      # (default 8080). Change only the left side to move the host port.
      - "8080:8080"
    # Every variable the app knows is declared (and documented) in .env;
    # docker compose passes the file through 1:1.
    env_file: .env
    networks:
      - shelly-debug

# Dedicated network so this stack doesn't join (or interfere with) the
# default bridge network of other compose projects on the same host.
networks:
  shelly-debug:
    name: shelly-debug

# Liveness: GET /healthz (no auth). The scratch image contains no shell or
# curl, so probe it from outside (reverse proxy, uptime monitor, k8s).
