<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Shelly Add-on Temperature Debug</title>
<meta name="theme-color" content="#f6f8fa" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
<!-- favicon.svg switches its palette with prefers-color-scheme; the PNG
     links (with media) are the fallback for browsers without SVG favicons -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" sizes="192x192" href="icon-light-192.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Shelly Temp">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="live-dot idle" id="livedot" aria-hidden="true"></span>
      <span class="brand-title">Shelly Add&#8209;On Temperature Debug</span>
    </div>
    <div class="searchwrap">
      <input id="search" type="search" autocomplete="off" spellcheck="false">
      <kbd aria-hidden="true">/</kbd>
    </div>
    <div class="prefs">
      <select id="langsel" aria-label="Language"></select>
      <select id="themesel" aria-label="Theme"></select>
    </div>
  </div>
</header>

<div class="statusstrip" id="statusstrip" hidden>
  <div class="statusstrip-inner">
    <div class="agg" id="aggstats"></div>
    <div class="devchips" id="devchips"></div>
    <div class="readings" id="readings"></div>
  </div>
</div>

<main>
  <div class="banner" id="banner" hidden><span class="banner-dot" aria-hidden="true"></span><span id="bannertext"></span></div>

  <section class="login" id="loginbox" hidden>
    <div class="login-card">
      <h2 id="tokenprompt"></h2>
      <div class="loginrow">
        <input id="tokeninput" type="password" autocomplete="current-password">
        <button class="btn primary" id="tokensave"></button>
      </div>
      <p class="loginerr" id="loginerr" hidden></p>
    </div>
  </section>

  <p class="subtitle" id="subtitle"></p>

  <div class="toolbar" id="toolbar" hidden>
    <button class="btn primary" id="querybtn"></button>
    <button class="btn" id="wigglebtn"></button>
    <select id="rangesel" class="rangesel"></select>
    <label class="auto"><input type="checkbox" id="autorefresh"><span id="autolabel"></span></label>
    <button class="btn" id="csvbtn"></button>
    <button class="btn" id="provbtn" hidden></button>
    <button class="btn danger" id="clearbtn"></button>
    <span class="lastq" id="lastq"></span>
  </div>
  <p class="hint" id="wigglehint" hidden></p>

  <section class="provpanel" id="provpanel" hidden>
    <div class="provhead">
      <h2 id="provtitle"></h2>
      <button class="provclose" id="provclose" type="button" aria-label="Close">✕</button>
    </div>
    <p class="provintro" id="provintro"></p>
    <div id="provlock">
      <p class="provlocknote" id="provlocknote"></p>
      <div class="loginrow">
        <input id="provkey" type="password" autocomplete="off">
        <button class="btn primary" id="provunlock"></button>
      </div>
      <p class="loginerr" id="provkeyerr" hidden></p>
    </div>
    <div id="provbody" hidden></div>
  </section>

  <div id="results"><p class="empty">…</p></div>
</main>

<footer>
  <div class="footer-inner">
    <details class="footer-legend" id="legendbox">
      <summary id="legendtitle"></summary>
      <table class="legendtable" id="legendtable"></table>
    </details>
    <div class="footer-notes">
      <span id="historynote"></span>
      <span id="disclaimer"></span>
    </div>
    <div class="footer-bottom">
      <div class="footer-app">
        <span class="footer-appname">Shelly Add&#8209;on Temperature Debug</span>
        <span class="footer-ver">__VERSION__</span>
        <span class="footer-sep" aria-hidden="true">·</span>
        <a href="https://github.com/steiner-dominik/shelly-add-on-temperature-debug" rel="noopener">GitHub</a>
        <span class="footer-sep" aria-hidden="true">·</span>
        <span>MIT</span>
      </div>
      <a class="footer-credit" href="https://dominik.st/einer" rel="noopener">
        <span class="footer-credit-by" id="footerby"></span>
        <span class="footer-credit-domain">dominik.st</span>
        <span class="footer-credit-arrow" aria-hidden="true">↗</span>
      </a>
    </div>
  </div>
</footer>
<div class="tooltip" id="tooltip"></div>
<script src="app.js"></script>
</body>
</html>
